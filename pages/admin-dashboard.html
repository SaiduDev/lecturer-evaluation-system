<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin Portal</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <div class="admin-layout">
    <div class="sidebar-overlay"></div>

    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">
        <img src="../assets/images/school-logo.svg" alt="University Logo" class="school-logo school-logo--sm" width="40" height="40">
        <div class="admin-sidebar__brand-info">
          <h2>Admin Portal</h2>
          <p>Lecturer Evaluation</p>
        </div>
      </div>
      <button class="sidebar-close" aria-label="Close sidebar"><i class="fa-solid fa-xmark"></i></button>
      <nav>
        <ul class="admin-nav">
          <li><a href="admin-dashboard.html" class="admin-nav__link" data-page="dashboard"><span class="nav-icon"><i class="fa-solid fa-gauge-high"></i></span><span>Dashboard</span></a></li>
          <li><a href="admin-departments.html" class="admin-nav__link" data-page="departments"><span class="nav-icon"><i class="fa-solid fa-building-columns"></i></span><span>Departments</span></a></li>
          <li><a href="admin-lecturers.html" class="admin-nav__link" data-page="lecturers"><span class="nav-icon"><i class="fa-solid fa-user-graduate"></i></span><span>Lecturers</span></a></li>
          <li><a href="admin-analytics.html" class="admin-nav__link" data-page="analytics"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span><span>Analytics</span></a></li>
          <li><a href="#" class="admin-nav__link" data-logout><span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span><span>Logout</span></a></li>
        </ul>
      </nav>
    </aside>

    <div class="admin-content">
      <div class="admin-topbar">
        <div class="flex gap-sm" style="align-items:center;">
          <button class="sidebar-toggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
          <h1 class="admin-topbar__title">Dashboard</h1>
        </div>
        <div class="admin-topbar__actions">
          <button class="theme-toggle theme-toggle--dark" data-theme-toggle aria-label="Toggle theme"><i class="fa-solid fa-moon"></i></button>
        </div>
      </div>

      <div class="admin-page">
        <!-- Stats Cards -->
        <div class="grid grid--4 mb-lg" id="stats-grid">
          <div class="stat-card stat-card--primary">
            <p class="stat-card__label">Total Lecturers</p>
            <p class="stat-card__value" id="stat-lecturers">—</p>
          </div>
          <div class="stat-card stat-card--success">
            <p class="stat-card__label">Total Evaluations</p>
            <p class="stat-card__value" id="stat-evaluations">—</p>
          </div>
          <div class="stat-card stat-card--warning">
            <p class="stat-card__label">Average Rating</p>
            <p class="stat-card__value" id="stat-rating">—</p>
          </div>
          <div class="stat-card">
            <p class="stat-card__label">Departments</p>
            <p class="stat-card__value" id="stat-departments">—</p>
          </div>
        </div>

        <div class="grid grid--2 gap-lg">
          <!-- Top Lecturers -->
          <div class="card">
            <h2 class="card__title mb-md"><i class="fa-solid fa-trophy" style="margin-right:0.5rem;color:var(--color-primary);"></i>Top Lecturers</h2>
            <div id="top-lecturers-chart" class="bar-chart"></div>
          </div>

          <!-- Department Performance -->
          <div class="card">
            <h2 class="card__title mb-md"><i class="fa-solid fa-building-columns" style="margin-right:0.5rem;color:var(--color-primary);"></i>Department Performance</h2>
            <div id="dept-performance-chart" class="bar-chart"></div>
          </div>
        </div>

        <div id="dashboard-error" class="empty-state" style="display:none;">
          <div class="empty-state__icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
          <h3 class="empty-state__title">Unable to Load Dashboard</h3>
          <p id="dashboard-error-msg"></p>
          <button class="btn btn--primary mt-md" id="retry-btn">Retry</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/loader.js"></script>
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script>
    (function () {
      'use strict';

      if (!UI.requireAdminAuth()) return;
      UI.initAdminSidebar('dashboard');

      async function loadDashboard() {
        try {
          // GET /analytics/dashboard — Fetch admin dashboard stats
          var data = await API.getDashboardAnalytics();
          var stats = data.stats || data;

          document.getElementById('stat-lecturers').textContent =
            stats.total_lecturers ?? stats.totalLecturers ?? '0';
          document.getElementById('stat-evaluations').textContent =
            stats.total_evaluations ?? stats.totalEvaluations ?? '0';
          document.getElementById('stat-rating').textContent =
            UI.formatNumber(stats.average_rating ?? stats.averageRating ?? 0, 1) + ' ★';
          document.getElementById('stat-departments').textContent =
            stats.total_departments ?? stats.totalDepartments ?? '—';

          /* Top lecturers chart */
          var topLecturers = data.top_lecturers || data.topLecturers || [];
          var topData = topLecturers.map(function (l) {
            return {
              label: l.name || l.lecturer_name,
              value: l.average_rating ?? l.averageRating ?? l.rating ?? 0
            };
          });
          UI.renderBarChart(document.getElementById('top-lecturers-chart'), topData, 5);

          /* Department performance chart */
          var deptPerf = data.department_performance || data.departmentPerformance || [];
          var deptData = deptPerf.map(function (d) {
            return {
              label: d.name || d.department_name,
              value: d.average_rating ?? d.averageRating ?? d.rating ?? 0
            };
          });
          UI.renderBarChart(document.getElementById('dept-performance-chart'), deptData, 5);

          document.getElementById('dashboard-error').style.display = 'none';
        } catch (err) {
          document.getElementById('dashboard-error').style.display = 'block';
          document.getElementById('dashboard-error-msg').textContent = err.message;
        }
      }

      document.getElementById('retry-btn').addEventListener('click', loadDashboard);
      loadDashboard();
    })();
  </script>
</body>
</html>
