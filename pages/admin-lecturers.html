<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecturers — Admin Portal</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <div class="admin-layout">
    <div class="sidebar-overlay"></div>

    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">
        <img src="../assets/images/logo.jpg" alt="University Logo" class="school-logo school-logo--sm" width="40" height="40">
        <div class="admin-sidebar__brand-info">
          <h2>Admin Portal</h2>
          <p>Lecturer Evaluation</p>
        </div>
      </div>
      <button class="sidebar-close" aria-label="Close sidebar"><i class="fa-solid fa-xmark"></i></button>
      <nav>
        <ul class="admin-nav">
          <li><a href="admin-dashboard.html" class="admin-nav__link" data-page="dashboard"><span class="nav-icon"><i class="fa-solid fa-gauge-high"></i></span><span>Dashboard</span></a></li>
          <li><a href="admin-departments.html" class="admin-nav__link" data-page="departments"><span class="nav-icon"><i class="fa-solid fa-building-columns"></i></span><span>Departments</span></a></li>
          <li><a href="admin-lecturers.html" class="admin-nav__link" data-page="lecturers"><span class="nav-icon"><i class="fa-solid fa-user-graduate"></i></span><span>Lecturers</span></a></li>
          <li><a href="admin-analytics.html" class="admin-nav__link" data-page="analytics"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span><span>Analytics</span></a></li>
          <li><a href="#" class="admin-nav__link" data-logout><span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span><span>Logout</span></a></li>
        </ul>
      </nav>
    </aside>

    <div class="admin-content">
      <div class="admin-topbar">
        <div class="flex gap-sm" style="align-items:center;">
          <button class="sidebar-toggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
          <h1 class="admin-topbar__title">Lecturer Management</h1>
        </div>
        <div class="admin-topbar__actions">
          <button class="btn btn--primary btn--responsive" id="add-lecturer-btn" aria-label="Add Lecturer"><span class="btn__icon">+</span><span class="btn__text">Add Lecturer</span></button>
          <button class="theme-toggle theme-toggle--dark" data-theme-toggle aria-label="Toggle theme"><i class="fa-solid fa-moon"></i></button>
        </div>
      </div>

      <div class="admin-page">
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="lecturers-table">
              <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <div id="lecturer-empty" class="empty-state" style="display:none;">
          <div class="empty-state__icon"><i class="fa-solid fa-user-graduate"></i></div>
          <h3 class="empty-state__title">No Lecturers Yet</h3>
          <p>Add lecturers and assign them to departments.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/loader.js"></script>
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script>
    (function () {
      'use strict';

      if (!UI.requireAdminAuth()) return;
      UI.initAdminSidebar('lecturers');

      var tableBody = document.getElementById('lecturers-table');
      var emptyState = document.getElementById('lecturer-empty');
      var lecturers = [];
      var departments = [];

      function getDeptName(deptId) {
        var dept = departments.find(function (d) { return d.id === deptId || d.id === parseInt(deptId, 10); });
        return dept ? dept.name : 'Unknown';
      }

      function renderTable() {
        if (lecturers.length === 0) {
          tableBody.innerHTML = '';
          emptyState.style.display = 'block';
          return;
        }

        emptyState.style.display = 'none';
        tableBody.innerHTML = lecturers.map(function (lecturer) {
          var deptName = lecturer.department_name || lecturer.department?.name || getDeptName(lecturer.department_id);
          return '<tr>' +
            '<td>' + lecturer.id + '</td>' +
            '<td><div class="flex gap-sm" style="align-items:center;">' +
              '<div class="lecturer-avatar" style="width:36px;height:36px;font-size:0.875rem;">' +
                UI.getInitials(lecturer.lecturer_name) +
              '</div>' +
              '<strong>' + UI.sanitizeInput(lecturer.lecturer_name) + '</strong>' +
            '</div></td>' +
            '<td>' + UI.sanitizeInput(lecturer.email || '—') + '</td>' +
            '<td><span class="badge badge--primary">' + UI.sanitizeInput(deptName) + '</span></td>' +
            '<td><div class="table__actions">' +
              '<button class="btn btn--danger btn--sm" data-delete="' + lecturer.id + '">Delete</button>' +
            '</div></td>' +
          '</tr>';
        }).join('');

        tableBody.querySelectorAll('[data-delete]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var id = parseInt(btn.dataset.delete, 10);
            var lecturer = lecturers.find(function (l) { return l.id === id; });
            UI.confirmDialog(
              'Are you sure you want to delete "' + (lecturer ? lecturer.name : 'this lecturer') + '"?',
              function () { deleteLecturer(id); },
              'Delete Lecturer'
            );
          });
        });
      }

      function openLecturerModal() {
        var form = document.createElement('form');

        var deptOptions = departments.map(function (d) {
          return '<option value="' + d.id + '">' + UI.sanitizeInput(d.name) + '</option>';
        }).join('');

        form.innerHTML =
          '<div class="form-group">' +
            '<label class="form-label form-label--required" for="lecturer-name">Full Name</label>' +
            '<input type="text" id="lecturer-name" class="form-input" required maxlength="100" placeholder="Dr. John Smith">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label" for="lecturer-email">Email</label>' +
            '<input type="email" id="lecturer-email" class="form-input" maxlength="150" placeholder="john.smith@university.edu">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label form-label--required" for="lecturer-dept">Department</label>' +
            '<select id="lecturer-dept" class="form-select" required>' +
              '<option value="">Select department...</option>' +
              deptOptions +
            '</select>' +
          '</div>';

        var footer = document.createElement('div');
        footer.style.display = 'flex';
        footer.style.gap = '8px';
        footer.style.justifyContent = 'flex-end';

        var cancelBtn = UI.createButton('Cancel', 'secondary', function () { modal.close(); });
        var saveBtn = UI.createButton('Add Lecturer', 'primary');

        footer.appendChild(cancelBtn);
        footer.appendChild(saveBtn);

        var modal = UI.openModal({
          title: 'Add New Lecturer',
          content: form,
          footer: footer
        });

        var isSaving = false;

        saveBtn.addEventListener('click', async function () {
          if (isSaving) return;

          var nameInput = form.querySelector('#lecturer-name');
          var emailInput = form.querySelector('#lecturer-email');
          var deptSelect = form.querySelector('#lecturer-dept');

          var name = nameInput.value.trim();
          var email = emailInput.value.trim();
          var departmentId = deptSelect.value;

          UI.clearFieldError(nameInput);
          UI.clearFieldError(emailInput);
          UI.clearFieldError(deptSelect);

          var hasError = false;
          if (!UI.isNotEmpty(name)) {
            UI.showFieldError(nameInput, 'Name is required');
            hasError = true;
          }
          if (email && !UI.isValidEmail(email)) {
            UI.showFieldError(emailInput, 'Invalid email format');
            hasError = true;
          }
          if (!departmentId) {
            UI.showFieldError(deptSelect, 'Please select a department');
            hasError = true;
          }
          if (hasError) return;

          isSaving = true;
          UI.setButtonLoading(saveBtn, true);

          try {
            // POST /lecturers — Add lecturer
            await API.createLecturer({
              lecturer_name: UI.stripHtml(name),
              email: email ? UI.stripHtml(email) : undefined,
              department_id: parseInt(departmentId, 10)
            });

            UI.showToast('Lecturer added successfully', 'success');
            modal.close();
            loadLecturers();
          } catch (err) {
            UI.showToast(err.message || 'Failed to add lecturer', 'error');
          } finally {
            isSaving = false;
            UI.setButtonLoading(saveBtn, false);
          }
        });
      }

      async function deleteLecturer(id) {
        try {
          // DELETE /lecturers/:id — Delete lecturer
          await API.deleteLecturer(id);
          UI.showToast('Lecturer deleted successfully', 'success');
          loadLecturers();
        } catch (err) {
          UI.showToast(err.message || 'Failed to delete lecturer', 'error');
        }
      }

      async function loadDepartments() {
        try {
          var data = await API.getDepartments();
          departments = Array.isArray(data) ? data : (data.departments || data.data || []);
        } catch (err) {
          departments = [];
        }
      }

      async function loadLecturers() {
        try {
          var data = await API.getAllLecturers();
          lecturers = Array.isArray(data) ? data : (data.lecturers || data.data || []);
          renderTable();
        } catch (err) {
          tableBody.innerHTML = '<tr><td colspan="5" class="text-center" style="color:var(--color-error);">' +
            UI.sanitizeInput(err.message) + '</td></tr>';
        }
      }

      document.getElementById('add-lecturer-btn').addEventListener('click', function () {
        if (departments.length === 0) {
          UI.showToast('Please create a department first', 'warning');
          return;
        }
        openLecturerModal();
      });

      loadDepartments().then(loadLecturers);
    })();
  </script>
</body>
</html>
